name: Metrics

on:
  schedule:
    - cron: "0 6 * * *"
  # Permite rodar manualmente pela aba Actions
  workflow_dispatch:
  # Roda tambem ao dar push na branch principal
  push:
    branches: ["main", "master"]

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Gerar github-metrics.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          user: marcosguida
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Araguaina

          # Linguagens mais usadas
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 8

          # Calendario de contribuicoes isometrico (substitui o activity graph)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
