name: Metrics

on:
  schedule:
    - cron: "0 6 * * *"          # diario, 06:00 UTC (~03:00 em Palmas)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      # Card de LINGUAGENS (baseado no perfil, sem valores fixos)
      - name: Linguagens
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: marcosguida
          filename: metrics-languages.svg
          template: classic
          base: ""                 
          config_timezone: America/Araguaina

          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          plugin_languages_colors: github
